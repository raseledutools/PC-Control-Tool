name: Build PDF Editor Pro (Windows EXE)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # অ্যাকশনস ট্যাব থেকে ম্যানুয়ালি বিল্ড রান করার জন্য

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # তোমার প্রোজেক্টের সাথে সামঞ্জস্যপূর্ণ পাইথন ভার্সন

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pypdf reportlab pillow pyinstaller

    - name: Build Executable using PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "PDF_Editor_Pro" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF-Editor-Pro-Windows-EXE
        path: dist/*.exe
