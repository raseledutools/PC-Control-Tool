name: Build RasPcCare 2.0

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install screen-brightness-control customtkinter pyinstaller pystray Pillow

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --hidden-import pystray --hidden-import PIL._tkinter_finder main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RasPcCare-V2
        path: dist/main.exe
