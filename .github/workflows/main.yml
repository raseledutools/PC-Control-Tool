name: Build Native RasGram Desktop

on:
  push:
    branches: [ "main", "master" ]

# এই অংশটি Node.js এর ওয়ার্নিং বন্ধ করে দেবে
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # এটি নিশ্চিত করবে যে গিটহাব লেটেস্ট নোড ভার্সন ব্যবহার করছে
        set-safe-directory: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pystray pillow pyinstaller

    - name: Create Native EXE
      shell: pwsh
      run: |
        # সব HTML এবং JS ফাইলকে নেটিভলি প্যাক করা
        pyinstaller --onefile --windowed --add-data "*.html;." --add-data "*.js;." --name "RasGram" main.py

    - name: Build Installer (Inno Setup)
      shell: pwsh
      run: |
        $iss = @"
        [Setup]
        AppName=RasGram Native
        AppVersion=1.0
        DefaultDirName={pf}\RasGram
        DefaultGroupName=RasGram
        OutputDir=.
        OutputBaseFilename=RasGram_Native_Setup
        PrivilegesRequired=admin

        [Files]
        Source: "dist\RasGram.exe"; DestDir: "{app}"; Flags: ignoreversion

        [Icons]
        Name: "{commondesktop}\RasGram"; Filename: "{app}\RasGram.exe"
        Name: "{userstartup}\RasGram"; Filename: "{app}\RasGram.exe"

        [Run]
        Filename: "{app}\RasGram.exe"; Description: "Launch RasGram"; Flags: nowait postinstall skipifsilent
        "@
        $iss | Out-File -FilePath setup.iss -Encoding utf8
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RasGram-Native-App
        path: RasGram_Native_Setup.exe
